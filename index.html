<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your Name - Portfolio</title>
    <meta name="description" content="A simple portfolio page.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        color: #171717;
        background: #f7f5ef;
        font-family: "DM Sans", system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f7f5ef;
        color: #171717;
      }

      main {
        width: min(720px, calc(100% - 32px));
        margin: 0 auto;
        padding: 96px 0;
      }

      .eyebrow {
        margin: 0 0 20px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 10ch;
        font-family: "DM Serif Display", Georgia, serif;
        font-size: clamp(3rem, 9vw, 6.5rem);
        font-weight: 400;
        line-height: 0.95;
      }

      p {
        max-width: 56ch;
        margin: 28px 0 0;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Mahesh's Notes / Work in progress</p>
      <h1>Mahesh Karra</h1>
      <p>Technical notes, projects, and essays coming soon.</p>
    </main>
  </body>
</html>
